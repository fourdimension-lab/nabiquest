<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ULTRA RESPONSIVE: ensures perfect fit on any phone, no collisions -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ Prophets · Journey of Light (responsive)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* RESET & SAFE LAYOUT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        :root {
            --primary: #0f3b2a;
            --primary-light: #1e5f44;
            --secondary: #daa353;
            --secondary-dark: #b8822b;
            --gold: #bf9345;
            --cream: #fdf8ed;
            --glass: rgba(253, 248, 237, 0.96);
            --text-dark: #1f300d;
            --text-light: #fef9e6;
            --shadow: 0 20px 35px rgba(0, 20, 0, 0.4);
        }

        body {
            background: radial-gradient(circle at 10% 20%, #1f704c, #0a2f1f);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            color: var(--text-dark);
            position: relative;
        }

        /* decorative background (unicode, no overflow) */
        body::before, body::after {
            content: "★ ☾ ✦";
            position: absolute;
            font-size: clamp(2.5rem, 10vw, 4rem);
            opacity: 0.1;
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
            font-family: 'Arial', sans-serif;
            line-height: 1;
            white-space: nowrap;
            z-index: 0;
        }
        body::before { top: 2%; left: 2%; }
        body::after { bottom: 2%; right: 2%; animation: float 10s reverse infinite; }
        @keyframes float { 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-15px) rotate(3deg); } }

        /* MAIN CARD – fits any screen, never overflows */
        .game-container {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            max-height: 820px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: var(--shadow), inset 0 0 0 2px var(--gold);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            transition: all 0.2s;
        }

        /* content wrapper uses full height, no overflow */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .fixed-header {
            flex-shrink: 0;
            margin-bottom: 12px;
            width: 100%;
        }

        /* scrollable area only when needed, with perfect touch */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) #ecdbb5;
            -webkit-overflow-scrolling: touch;
            border-radius: 20px;
        }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-track { background: #ecdbb5; border-radius: 12px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 12px; }

        .no-scroll {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: visible;
        }

        /* Header row – always fits */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #ecdbaa, #e0c78c);
            padding: 8px 14px;
            border-radius: 60px;
            border: 2px solid var(--gold);
            box-shadow: 0 4px 0 #8f6e32;
            gap: 8px;
            flex-wrap: wrap;
            min-height: 58px;
        }
        .welcome-tag {
            font-weight: 700;
            font-size: 0.9rem;
            color: #1f4a1a;
            background: rgba(255,255,255,0.3);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #b88d4b;
            max-width: 170px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .score-box {
            font-weight: 800;
            color: #4a3715;
            background: #fef7d2;
            padding: 6px 16px;
            border-radius: 40px;
            border: 2px solid #d4a259;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1rem;
            white-space: nowrap;
        }

        /* progress squares grid – no overflow */
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: #efe2c6;
            padding: 12px 4px;
            border-radius: 24px;
            text-align: center;
            border: 2px solid #be974b;
            font-size: 0.8rem;
        }
        .stat-item div:first-child { font-size: 1.5rem; line-height: 1; }
        .stat-item div:nth-child(2) { opacity: 0.7; font-size: 0.7rem; }
        .stat-item div:last-child { font-weight: 800; font-size: 1.2rem; }

        /* level cards */
        .level-card {
            background: linear-gradient(145deg, #ffffff, #f9f0da);
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 70px;
            border: 2px solid #c28d35;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 0 #946f32;
            cursor: pointer;
            transition: transform 0.1s ease;
            width: 100%;
        }
        .level-card:active { transform: translateY(4px); box-shadow: 0 2px 0 #946f32; }
        .level-card.locked { opacity: 0.6; filter: grayscale(1); background: #d9d9d9; border-color: #8a8a8a; box-shadow: 0 5px 0 #6b6b6b; pointer-events: none; }
        .level-card.completed { background: linear-gradient(145deg, #d4edda, #c3e6cb); border-color: #2f8f3a; box-shadow: 0 5px 0 #1f692a; }
        .level-number {
            width: 42px; height: 42px; background: var(--primary); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.3rem; border: 3px solid var(--gold); flex-shrink: 0;
        }
        .level-info { flex: 1; min-width: 0; }
        .level-name { font-weight: 700; font-size: 1.1rem; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .level-status { font-size: 0.7rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.3px; }

        /* buttons – consistent tap size */
        .btn {
            cursor: pointer; border: none; font-family: inherit; transition: 0.1s ease; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600; background: none; touch-action: manipulation;
        }
        .btn-primary {
            background: var(--secondary); color: #1f300d; padding: 14px 20px; border-radius: 60px; font-size: 1.1rem; font-weight: 700; border: 3px solid #ffdf9c; box-shadow: 0 6px 0 #9e6b28; width: fit-content; min-width: 160px; margin: 10px auto;
        }
        .btn-primary:active { transform: translateY(5px); box-shadow: 0 2px 0 #9e6b28; }

        .btn-back, .btn-hint {
            padding: 8px 16px; border-radius: 50px; font-size: 0.9rem; font-weight: 600; border: 2px solid; box-shadow: 0 4px 0 #4f3c20; white-space: nowrap;
        }
        .btn-back { background: #9c834c; color: white; border-color: #5f4a27; }
        .btn-hint { background: #b45f2b; color: white; border-color: #ffcd94; box-shadow: 0 4px 0 #7a401e; }

        .btn-next {
            background: var(--secondary); color: #1f300d; padding: 12px 20px; border-radius: 60px; font-size: 1.2rem; font-weight: 700; border: 3px solid #ffdf9c; box-shadow: 0 6px 0 #9e6b28; width: 100%; margin-top: 10px; 
        }
        .btn-next.hidden { display: none; }

        /* Story panel – flexible text */
        .story-panel {
            background: linear-gradient(145deg, #fbefcf, #f5e2bc); border-radius: 40px; border: 4px solid #c89b4a; padding: 20px 16px; box-shadow: 0 10px 0 #966d30; margin: 8px 0 12px; flex: 1; display: flex; flex-direction: column; min-height: 200px; max-height: 60vh;
        }
        .prophet-title {
            font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 800; color: #175522; background: #f8eac2; display: inline-block; padding: 6px 22px; border-radius: 70px; border: 3px solid #eba031; margin-bottom: 15px; box-shadow: 0 5px 0 #a57129; align-self: flex-start; font-family: 'Playfair Display', serif; max-width: 100%; word-break: break-word;
        }
        .story-text {
            font-size: 0.95rem; line-height: 1.6; color: #1a3f1a; background: #fffdf2; padding: 18px; border-radius: 28px; border: 2px dashed #b57c2a; overflow-y: auto; flex: 1; scrollbar-width: thin;
        }

        /* quiz */
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center; background: #eedbaa; border-radius: 60px; padding: 8px 16px; border: 3px solid #af7b36; margin-bottom: 10px; box-shadow: 0 4px 0 #7e5721; gap: 5px; flex-wrap: wrap;
        }
        .level-badge { background: var(--primary); color: #ffecb3; padding: 5px 18px; border-radius: 40px; font-weight: 700; font-size: 0.85rem; border: 2px solid #f5cd83; white-space: nowrap; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin: 12px 0; text-align: center; color: var(--text-dark); font-family: 'Playfair Display', serif; word-break: break-word; }

        .options-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 10px 0;
        }
        .option-btn {
            background: white; border: 3px solid #c1812b; border-radius: 60px; padding: 14px 6px; font-weight: 600; font-size: 0.9rem; box-shadow: 0 5px 0 #8e561a; cursor: pointer; text-align: center; transition: 0.05s; width: 100%; word-break: break-word; line-height: 1.3;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8e561a; }
        .option-btn.correct { background: #b8edb8; border-color: #1e861e; transform: translateY(2px); box-shadow: 0 2px 0 #0f5e0f; }
        .option-btn.wrong { background: #f7c2c2; border-color: #b33131; transform: translateY(2px); box-shadow: 0 2px 0 #771c1c; }
        .option-btn.disabled { opacity: 0.3; pointer-events: none; }

        .feedback {
            background: #fff9e1; border-radius: 60px; padding: 12px 16px; margin: 12px 0 5px; font-size: 1rem; font-weight: 600; border: 3px solid #f2b042; text-align: center; word-break: break-word;
        }
        .points-badge { background: #1f642f; color: #ffe8ae; padding: 8px 20px; border-radius: 50px; font-weight: 700; font-size: 1.1rem; text-align: center; border: 3px solid #f5cd83; }

        /* welcome / reward screens */
        .welcome-screen, .reward-page {
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 15px; padding: 10px;
        }
        .welcome-icon, .reward-icon { font-size: 4rem; animation: float 4s infinite; font-family: 'Arial', sans-serif; }
        .welcome-title { font-size: clamp(2rem, 7vw, 2.5rem); font-weight: 900; color: var(--primary); font-family: 'Playfair Display', serif; text-shadow: 2px 2px 0 var(--gold); }
        .welcome-input { width: 90%; max-width: 300px; padding: 14px 18px; font-size: 1rem; border: 3px solid var(--gold); border-radius: 60px; background: white; text-align: center; box-shadow: inset 0 3px 8px #d4b27e, 0 4px 0 #8f6e32; }

        /* micro fixes for very tiny screens */
        @media (max-width: 380px) {
            .game-container { padding: 14px 10px; border-radius: 36px; }
            .options-grid { grid-template-columns: 1fr; }
            .btn-primary { min-width: 140px; font-size: 1rem; }
            .header-row { flex-direction: column; align-items: stretch; }
            .welcome-tag { max-width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer"></div>

    <script>
        (function(){
            // ========== 25 PROPHETS DATA ==========
            const prophets = [
                { name: "Adam (AS)", article: "Adam was the first human created by Allah from clay. He lived in Paradise with Hawwa but was sent to Earth after eating from the forbidden tree. He repented and Allah forgave him. He is the father of mankind and the first prophet. He taught his children to worship one God." },
                { name: "Idris (AS)", article: "Idris was a prophet known for his wisdom and knowledge. He was truthful and patient. He excelled in astronomy and writing. The Quran describes him as a righteous man and elevated him to a high station. He taught his people to worship Allah alone." },
                { name: "Nuh (AS)", article: "Nuh called his people to Allah for 950 years. Only a few believed. He built an ark by Allah's command. A great flood came and drowned the disbelievers. Nuh and the believers were saved. He is known as the second father of humanity." },
                { name: "Hud (AS)", article: "Hud was sent to the people of 'Ad. They were powerful but worshipped idols. Hud warned them to worship Allah alone. They rejected him and were destroyed by a fierce wind. The believers were saved. Hud is known for his patience." },
                { name: "Salih (AS)", article: "Salih was sent to the Thamud people. They demanded a miracle: a she-camel from rocks. Allah gave them the camel, but most killed it. They were destroyed by an earthquake. Salih and his followers were saved." },
                { name: "Ibrahim (AS)", article: "Ibrahim is the friend of Allah. He smashed the idols of his people and was thrown into fire, but Allah made the fire cool. He was tested with the command to sacrifice his son Isma'il, and both submitted. Allah replaced his son with a ram. He built the Kaaba with Isma'il." },
                { name: "Lut (AS)", article: "Lut was sent to the people of Sodom. They practiced immoral acts. Lut warned them, but they refused. Angels visited Lut and told him to leave at night. The city was destroyed by a rain of stones. His wife was left behind." },
                { name: "Isma'il (AS)", article: "Isma'il was the son of Ibrahim. He was a righteous and patient boy. He helped his father build the Kaaba. He learned Arabic and became a prophet. He taught his family to pray and give charity. He is an ancestor of Prophet Muhammad." },
                { name: "Ishaq (AS)", article: "Ishaq was the second son of Ibrahim, born from Sarah. He was a blessed prophet. He lived in Canaan and taught people to worship Allah. His descendants include many prophets like Ya'qub and Yusuf." },
                { name: "Ya'qub (AS)", article: "Ya'qub was also called Israel. He was the son of Ishaq. He was patient when his son Yusuf was lost. He wept until he lost his eyesight, but never lost hope in Allah. Eventually he was reunited with Yusuf." },
                { name: "Yusuf (AS)", article: "Yusuf was the beloved son of Ya'qub. His brothers threw him in a well. He was sold in Egypt and later imprisoned. He interpreted the king's dream and became a minister. He forgave his brothers and was reunited with his family." },
                { name: "Ayyub (AS)", article: "Ayyub was very rich but lost everything. He was tested with severe illness for many years. He remained patient and faithful. He prayed to Allah, and Allah restored his health and wealth, giving him even more." },
                { name: "Shu'ayb (AS)", article: "Shu'ayb was sent to the people of Midian. They cheated in weights and measures. He told them to be just and fair. They mocked him and were destroyed by an earthquake. Shu'ayb and the believers were saved." },
                { name: "Musa (AS)", article: "Musa spoke directly to Allah. He was saved as a baby from Pharaoh. He fled to Madyan and later returned with miracles. He confronted Pharaoh and led the Israelites out of Egypt. He received the Torah on Mount Sinai." },
                { name: "Harun (AS)", article: "Harun was the brother of Musa. He was eloquent and helped Musa deliver the message. He stayed with the Israelites when Musa went to Mount Sinai. He tried to stop them from worshipping the golden calf." },
                { name: "Dawud (AS)", article: "Dawud was a king and prophet. He killed Goliath with a sling. Allah gave him the Zabur. He had a beautiful voice, and mountains and birds joined him in praise. He was a just ruler." },
                { name: "Sulayman (AS)", article: "Sulayman was the son of Dawud. He could understand the language of birds and animals. He commanded the jinn and the wind. He had a vast kingdom and judged wisely. He invited the Queen of Sheba to submit to Allah." },
                { name: "Ilyas (AS)", article: "Ilyas was sent to his people who worshipped Ba'l. He called them to worship Allah alone. They rejected him. He is mentioned in the Quran as a righteous messenger." },
                { name: "Al-Yasa (AS)", article: "Al-Yasa succeeded Ilyas. He continued calling people to righteousness among the Children of Israel. The Quran praises him as one of the excellent ones." },
                { name: "Dhul-Kifl (AS)", article: "Dhul-Kifl is believed to be a patient and righteous prophet. He was fair in his judgments. The Quran mentions him as one of the steadfast prophets." },
                { name: "Yunus (AS)", article: "Yunus was swallowed by a large fish after leaving his people in anger. He repented in the darkness of the fish's belly. Allah forgave him and caused the fish to release him. His people later believed." },
                { name: "Zakariyya (AS)", article: "Zakariyya was the guardian of Maryam. He was old and prayed for a son. Allah gave him Yahya. He was a skilled carpenter and steadfast in faith." },
                { name: "Yahya (AS)", article: "Yahya was the son of Zakariyya. He was given wisdom as a child. He confirmed the word of Allah. He was ascetic and righteous. He was martyred for speaking the truth." },
                { name: "Isa (AS)", article: "Isa was born miraculously to Maryam. He spoke in the cradle. He healed the blind and leper by Allah's permission. He was given the Injil. He was not crucified but raised to Allah. He will return before the Day of Judgment." },
                { name: "Muhammad (PBUH)", article: "Muhammad is the final prophet. He was born in Mecca. He received the Quran through Jibril. He taught monotheism and kindness. He faced persecution and migrated to Medina. He united Arabia and is the best example for mankind." }
            ];

            // generate 5 simple questions per prophet (always from article)
            function generateQuestionsForLevel(level) {
                const p = prophets[level];
                const sentences = p.article.split(/[.!?]+/).filter(s => s.trim().length > 10);
                return [
                    { question: `Who is this prophet?`, options: [p.name, prophets[(level+3)%25].name, prophets[(level+7)%25].name, prophets[(level+11)%25].name], correctIndex: 0 },
                    { question: `Which fact is true about ${p.name}?`, options: [ sentences[0]?.trim() || p.article.substring(0,45)+'...', 'He ruled Rome', 'He had no miracles', 'He was from China' ], correctIndex: 0 },
                    { question: `Choose a correct statement:`, options: [ sentences[1]?.trim() || sentences[0]?.trim() || 'He was a prophet', 'He was a merchant', 'He built pyramids', 'He wrote Psalms' ], correctIndex: 0 },
                    { question: `What is mentioned about ${p.name}?`, options: [ sentences[2]?.trim() || p.article.substring(0,40)+'...', 'He lived in India', 'He was a blacksmith', 'He never prayed' ], correctIndex: 0 },
                    { question: `Is ${p.name} recognized in Islam?`, options: ['Yes, he is a prophet', 'No', 'Only in Torah', 'Only in Bible'], correctIndex: 0 }
                ];
            }

            // ========== GAME STATE ==========
            let state = {
                name: localStorage.getItem('prophet_name') || '',
                score: parseInt(localStorage.getItem('prophet_score')) || 0,
                attempts: parseInt(localStorage.getItem('prophet_attempts')) || 0,
                correct: parseInt(localStorage.getItem('prophet_correct')) || 0,
                incorrect: parseInt(localStorage.getItem('prophet_incorrect')) || 0,
                unlocked: JSON.parse(localStorage.getItem('prophet_unlocked')) || [true, ...Array(24).fill(false)],
                completed: JSON.parse(localStorage.getItem('prophet_completed')) || []
            };

            let currentLevel = 0;
            let currentQuestionIndex = 0;
            let currentQuestions = [];
            let selectedOption = null;
            let hintsRemaining = 3;
            let levelPoints = 0;

            const container = document.getElementById('gameContainer');
            function saveState() {
                localStorage.setItem('prophet_name', state.name);
                localStorage.setItem('prophet_score', state.score);
                localStorage.setItem('prophet_attempts', state.attempts);
                localStorage.setItem('prophet_correct', state.correct);
                localStorage.setItem('prophet_incorrect', state.incorrect);
                localStorage.setItem('prophet_unlocked', JSON.stringify(state.unlocked));
                localStorage.setItem('prophet_completed', JSON.stringify(state.completed));
            }

            // render helper
            function renderWithHeader(headerContent, mainContent, isScrollable = true) {
                container.innerHTML = `
                    <div class="content-wrapper">
                        <div class="fixed-header">${headerContent}</div>
                        <div class="${isScrollable ? 'scroll-area' : 'no-scroll'}">${mainContent}</div>
                    </div>
                `;
            }

            // ========== WELCOME ==========
            function renderWelcome() {
                container.innerHTML = `
                    <div class="content-wrapper">
                        <div class="welcome-screen">
                            <div class="welcome-icon">🌙</div>
                            <div class="welcome-title">Journey of Light</div>
                            <p style="opacity:0.8;">25 prophets · quiz & stories</p>
                            <input type="text" class="welcome-input" id="nameInput" placeholder="Your name" value="${state.name}">
                            <button class="btn btn-primary" id="startBtn">Begin Quest</button>
                        </div>
                    </div>
                `;
                document.getElementById('startBtn').addEventListener('click', ()=>{
                    const name = document.getElementById('nameInput').value.trim();
                    if(!name) return alert('Enter your name');
                    state.name = name;
                    saveState();
                    renderMainMenu();
                });
            }

            // ========== MAIN MENU ==========
            function renderMainMenu() {
                const header = `
                    <div class="header-row">
                        <div class="welcome-tag" title="${state.name}">Welcome, ${state.name}</div>
                        <div class="score-box">⭐ ${state.score}</div>
                    </div>
                `;
                const main = `
                    <div style="margin-bottom:12px;">
                        <div class="progress-grid">
                            <div class="stat-item"><div>📊</div><div>Attempts</div><div>${state.attempts}</div></div>
                            <div class="stat-item"><div>✅</div><div>Correct</div><div>${state.correct}</div></div>
                            <div class="stat-item"><div>❌</div><div>Incorrect</div><div>${state.incorrect}</div></div>
                            <div class="stat-item"><div>🏆</div><div>Done</div><div>${state.completed.length}/${prophets.length}</div></div>
                        </div>
                    </div>
                    <div>
                        ${prophets.map((p,i)=>{
                            let locked = !state.unlocked[i];
                            let completed = state.completed.includes(i);
                            let status = completed ? '✅ Completed' : (locked ? '🔒 Locked' : '📖 Ready');
                            return `<div class="level-card ${locked?'locked':''} ${completed?'completed':''}" onclick="window.openLevel(${i})">
                                <div class="level-number">${i+1}</div>
                                <div class="level-info"><div class="level-name">${p.name}</div><div class="level-status">${status}</div></div>
                                <div style="font-size:1.2rem;">${completed?'✅':(locked?'🔒':'📘')}</div>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                renderWithHeader(header, main, true);
            }

            // ========== STORY PAGE ==========
            window.openLevel = (idx) => {
                if(!state.unlocked[idx]) return;
                currentLevel = idx;
                let p = prophets[idx];
                let header = `<div style="display:flex; justify-content:space-between; align-items:center; width:100%; flex-wrap:wrap; gap:6px;">
                    <button class="btn btn-back" onclick="renderMainMenu()">← Back</button>
                    <div style="background:#846f46; color:white; padding:5px 20px; border-radius:50px; font-weight:600; border:2px solid #e6b864;">Level ${idx+1}</div>
                </div>`;
                let main = `<div class="story-panel"><div class="prophet-title">${p.name}</div><div class="story-text">${p.article}</div></div>
                    <button class="btn btn-primary" onclick="window.startQuiz(${idx})">📝 Start Quiz (5 Q)</button>`;
                renderWithHeader(header, main, false);
            };

            window.startQuiz = (level) => {
                currentLevel = level;
                currentQuestions = generateQuestionsForLevel(level);
                currentQuestionIndex = 0;
                selectedOption = null;
                hintsRemaining = 3;
                levelPoints = 0;
                renderQuiz();
            };

            function renderQuiz() {
                if(currentQuestionIndex >= 5) {
                    if(!state.completed.includes(currentLevel)) {
                        state.completed.push(currentLevel);
                        if(currentLevel+1 < prophets.length) state.unlocked[currentLevel+1] = true;
                        state.score += 100;
                    }
                    saveState();
                    renderLevelComplete();
                    return;
                }
                let q = currentQuestions[currentQuestionIndex];
                let header = `<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
                    <button class="btn btn-back" onclick="window.openLevel(${currentLevel})">← Story</button>
                    <button class="btn btn-hint" id="hintBtn">💡 Hint (${hintsRemaining})</button>
                </div>`;
                let main = `
                    <div class="quiz-header"><span class="level-badge">${prophets[currentLevel].name}</span><span style="font-weight:600;">Q${currentQuestionIndex+1}/5</span></div>
                    <div class="question-text">${q.question}</div>
                    <div class="options-grid" id="optionsContainer">${q.options.map((opt,i)=>`<button class="option-btn" data-opt="${i}">${opt}</button>`).join('')}</div>
                    <div class="feedback" id="feedbackMsg">Choose your answer</div>
                    <button class="btn-next ${selectedOption!==null?'':'hidden'}" id="nextBtn">→ Next Question</button>
                `;
                renderWithHeader(header, main, false);

                document.querySelectorAll('.option-btn').forEach(btn => btn.addEventListener('click', (e)=>{
                    if(selectedOption!==null) return;
                    let idx = parseInt(btn.dataset.opt);
                    handleAnswer(idx);
                }));

                document.getElementById('nextBtn')?.addEventListener('click', ()=>{
                    currentQuestionIndex++;
                    selectedOption = null;
                    renderQuiz();
                });

                document.getElementById('hintBtn')?.addEventListener('click', ()=>{
                    if(hintsRemaining<=0 || selectedOption!==null) return alert(selectedOption!==null?'Already answered':'No hints left');
                    let correct = q.correctIndex;
                    let opts = document.querySelectorAll('.option-btn');
                    let wrongIdx = [];
                    opts.forEach((o,i)=>{ if(i!==correct && !o.classList.contains('disabled')) wrongIdx.push(i); });
                    if(wrongIdx.length) {
                        let r = wrongIdx[Math.floor(Math.random()*wrongIdx.length)];
                        opts[r].classList.add('disabled');
                        opts[r].style.opacity = '0.3';
                        hintsRemaining--;
                        document.getElementById('hintBtn').innerHTML = `💡 Hint (${hintsRemaining})`;
                    }
                });
            }

            function handleAnswer(choice) {
                let q = currentQuestions[currentQuestionIndex];
                let correct = q.correctIndex;
                let opts = document.querySelectorAll('.option-btn');
                selectedOption = choice;
                state.attempts++;
                if(choice === correct) {
                    opts[choice].classList.add('correct');
                    state.correct++; state.score += 50; levelPoints++;
                    document.getElementById('feedbackMsg').innerHTML = '✅ MashaAllah! Correct!';
                } else {
                    opts[choice].classList.add('wrong');
                    opts[correct].classList.add('correct');
                    state.incorrect++;
                    document.getElementById('feedbackMsg').innerHTML = '❌ Not this time. Read the story.';
                }
                opts.forEach(o => o.style.pointerEvents = 'none');
                document.getElementById('nextBtn').classList.remove('hidden');
                saveState();
            }

            function renderLevelComplete() {
                let header = `<div class="header-row"><div class="welcome-tag">${state.name}</div><div class="score-box">⭐ ${state.score}</div></div>`;
                let main = `<div class="reward-page"><div class="reward-icon">🏆</div><div class="reward-title">Level Done!</div><div class="points-badge">You got ${levelPoints}/5 correct +100 bonus</div><button class="btn btn-primary" onclick="renderMainMenu()">🌟 Continue</button></div>`;
                renderWithHeader(header, main, false);
            }

            // init
            if(state.name) renderMainMenu(); else renderWelcome();
            window.renderMainMenu = renderMainMenu;
        })();
    </script>
</body>
</html>
